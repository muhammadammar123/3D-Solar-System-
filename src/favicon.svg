<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="sun-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="60%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#03030b" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Background Glow -->
  <circle cx="50" cy="50" r="45" fill="url(#sun-glow)" opacity="0.8"/>
  <!-- Central Planet Core -->
  <circle cx="50" cy="50" r="18" fill="#ffffff" />
  <!-- Diagonal Orbit Ring -->
  <ellipse cx="50" cy="50" rx="36" ry="8" fill="none" stroke="#06b6d4" stroke-width="3" transform="rotate(-30, 50, 50)" />
</svg>
